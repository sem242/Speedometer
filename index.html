<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>GPS Speedometer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>GPS Speedometer</h1>
        </header>

        <div class="status-section">
            <div id="status" class="status">Waiting for GPS...</div>
            <div id="accuracy" class="accuracy"></div>
        </div>

        <div class="speedometer-container">
            <svg class="speedometer" viewBox="0 0 200 200">
                <!-- Gauge background -->
                <circle cx="100" cy="100" r="95" fill="none" stroke="#333" stroke-width="2"/>
                
                <!-- Speed scale markings -->
                <g id="markings">
                    <line x1="100" y1="10" x2="100" y2="20" stroke="#999" stroke-width="2"/>
                    <line x1="100" y1="10" x2="100" y2="20" stroke="#999" stroke-width="2" transform="rotate(18 100 100)"/>
                    <line x1="100" y1="10" x2="100" y2="20" stroke="#999" stroke-width="2" transform="rotate(36 100 100)"/>
                    <line x1="100" y1="10" x2="100" y2="20" stroke="#999" stroke-width="2" transform="rotate(54 100 100)"/>
                    <line x1="100" y1="10" x2="100" y2="20" stroke="#999" stroke-width="2" transform="rotate(72 100 100)"/>
                    <line x1="100" y1="10" x2="100" y2="20" stroke="#999" stroke-width="2" transform="rotate(90 100 100)"/>
                    <line x1="100" y1="10" x2="100" y2="20" stroke="#999" stroke-width="2" transform="rotate(108 100 100)"/>
                    <line x1="100" y1="10" x2="100" y2="20" stroke="#999" stroke-width="2" transform="rotate(126 100 100)"/>
                    <line x1="100" y1="10" x2="100" y2="20" stroke="#999" stroke-width="2" transform="rotate(144 100 100)"/>
                    <line x1="100" y1="10" x2="100" y2="20" stroke="#999" stroke-width="2" transform="rotate(162 100 100)"/>
                </g>

                <!-- Speed labels -->
                <text x="100" y="25" text-anchor="middle" class="speed-label">0</text>
                <text x="160" y="45" text-anchor="middle" class="speed-label">20</text>
                <text x="185" y="105" text-anchor="middle" class="speed-label">40</text>
                <text x="160" y="160" text-anchor="middle" class="speed-label">60</text>
                <text x="100" y="185" text-anchor="middle" class="speed-label">80</text>
                <text x="40" y="160" text-anchor="middle" class="speed-label">100</text>
                <text x="15" y="105" text-anchor="middle" class="speed-label">120</text>
                <text x="40" y="45" text-anchor="middle" class="speed-label">140</text>

                <!-- Needle -->
                <line id="needle" x1="100" y1="100" x2="100" y2="30" stroke="#e74c3c" stroke-width="3" stroke-linecap="round"/>
                
                <!-- Center circle -->
                <circle cx="100" cy="100" r="6" fill="#e74c3c"/>
            </svg>

            <div class="speed-display">
                <div id="speedValue" class="speed-value">0</div>
                <div class="speed-unit">km/h</div>
            </div>
        </div>

        <div class="info-section">
            <div class="info-box">
                <label>Latitude:</label>
                <div id="latitude">-</div>
            </div>
            <div class="info-box">
                <label>Longitude:</label>
                <div id="longitude">-</div>
            </div>
            <div class="info-box">
                <label>Altitude:</label>
                <div id="altitude">-</div>
            </div>
            <div class="info-box">
                <label>Max Speed:</label>
                <div id="maxSpeed">0 km/h</div>
            </div>
        </div>

        <div class="button-section">
            <button id="startBtn" class="btn btn-primary">Start GPS</button>
            <button id="resetBtn" class="btn btn-secondary">Reset</button>
        </div>

        <div class="footer">
            <p>iPhone GPS Speedometer v1.0</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
